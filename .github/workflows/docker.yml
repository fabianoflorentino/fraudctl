# Required secrets (Settings → Secrets and variables → Actions):
#
#   Environment: DOCKERHUB
#     DOCKERHUB_USERNAME  Docker Hub login name
#     DOCKERHUB_TOKEN     Docker Hub access token
#
#   Environment: GITHUB
#     GIT_HUB_TOKEN  GitHub personal access token with contents:write + workflow scope

name: Image, Publish, Tag and Release

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry-run (skip publishing actions)"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
  push:
    branches:
      - main
    paths-ignore:
      - 'README.md'
      - 'LICENSE'
      - 'docs/**'
      - '**/*.md'
      - 'scripts/**'
      - 'site/**'
      - 'Makefile'
      - '.agents/**'
      - 'PROJECT_PLAN.md'

permissions:
  contents: write
  packages: write

jobs:
  # ── Compute next semantic version from latest git tag ──────────────────────
  version:
    name: Compute next version
    runs-on: ubuntu-latest
    outputs:
      next_version: ${{ steps.compute.outputs.next_version }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Compute next patch version
        id: compute
        run: |
          LATEST=$(git tag --list 'v1.0.*' | sort -t. -k3 -n | tail -1)
          if [ -z "$LATEST" ]; then
            NEXT="v1.0.1"
          else
            PATCH=$(echo "$LATEST" | cut -d. -f3)
            NEXT="v1.0.$((PATCH + 1))"
          fi
          echo "Latest tag: ${LATEST:-<none>}  →  Next version: $NEXT"
          echo "next_version=$NEXT" >> $GITHUB_OUTPUT

  # Reusable build job (produces artifacts used by later jobs)
  build:
    name: Build (reusable)
    needs: version
    uses: ./.github/workflows/build.yml
    with:
      run_tests: true
      dry_run: ${{ github.event.inputs.dry_run == 'true' }}

  # ── Build & push Docker image to Docker Hub ────────────────────────────────
  build_and_push:
    name: Build and Push to Docker Hub
    environment: DOCKERHUB
    needs: [version, build]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Log in to Docker Hub
        if: ${{ github.event.inputs.dry_run != 'true' }}
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: |
          IMAGE_REF="${{ github.repository }}:${{ needs.version.outputs.next_version }}"
          echo "IMAGE_REF=${IMAGE_REF}" >> $GITHUB_ENV
          docker buildx build \
            --cache-from type=gha \
            --cache-to type=gha,mode=max \
            --load \
            -t "${IMAGE_REF}" \
            -f ./Dockerfile .

      - name: Smoke test — verify binary entrypoint
        run: |
          echo "Running smoke test on ${IMAGE_REF}"
          OUTPUT=$(docker run --rm "${IMAGE_REF}" --help 2>&1 || true)
          echo "${OUTPUT}"
          if ! echo "${OUTPUT}" | grep -qE "Usage:|fraudctl"; then
            echo "Smoke test FAILED: binary did not produce expected help output"
            exit 1
          fi
          echo "Smoke test passed"

      - name: Push Docker image to Docker Hub
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: |
          docker push "${IMAGE_REF}"

      - name: Download binary artifact
        uses: actions/download-artifact@v4
        with:
          name: fraudctl-linux-amd64
          path: .

  # ── Docker Scout CVE scan ────────────────────────────────────────────────────
  docker_scout:
    name: Docker Scout CVE Scan
    environment: DOCKERHUB
    needs: [version, build_and_push]
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.dry_run != 'true' }}

    steps:
      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Docker Scout CVE scan
        uses: docker/scout-action@v1
        with:
          command: cves
          image: ${{ github.repository }}:${{ needs.version.outputs.next_version }}
          only-severities: critical,high
          exit-code: true

  # ── Create and push Git tag ──────────────────────────────────────────────────
  tag:
    name: Tag
    environment: GITHUB
    needs: [version, build_and_push, docker_scout]
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.dry_run != 'true' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Create and push tag
        id: create_tag
        run: |
          TAG_NAME="${{ needs.version.outputs.next_version }}"
          echo "TAG_NAME=$TAG_NAME" >> $GITHUB_ENV

          git remote set-url origin https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}

          git tag $TAG_NAME
          git push origin $TAG_NAME

          echo "tag_name=$TAG_NAME" >> $GITHUB_OUTPUT
        env:
          GITHUB_TOKEN: ${{ secrets.GIT_HUB_TOKEN || secrets.GITHUB_TOKEN }}

    outputs:
      tag_name: ${{ steps.create_tag.outputs.tag_name }}

  # ── Create GitHub Release ────────────────────────────────────────────────────
  release:
    name: Release
    environment: GITHUB
    needs: [version, build_and_push, docker_scout, tag]
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.dry_run != 'true' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Download binary build artifact
        uses: actions/download-artifact@v4
        with:
          name: fraudctl-linux-amd64
          path: .

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ needs.tag.outputs.tag_name }}
          name: ${{ needs.tag.outputs.tag_name }}
          generate_release_notes: true
          files: ./fraudctl
        env:
          GITHUB_TOKEN: ${{ secrets.GIT_HUB_TOKEN }}

  # ── Trigger pkg.go.dev to index the new version ──────────────────────────────
  go_proxy:
    name: pkg.go.dev
    needs: [version, build_and_push, docker_scout, tag, release]
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.dry_run != 'true' }}

    steps:
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ">=1.26"

      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Update pkg.go.dev
        run: GOPROXY=https://proxy.golang.org go list -m github.com/fabianoflorentino/fraudctl@${{ needs.version.outputs.next_version }}
