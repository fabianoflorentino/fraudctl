name: LB Image

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry-run (skip publishing)"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
  push:
    branches:
      - main
    paths:
      - 'cmd/lb/**'
      - '.github/workflows/lb.yml'

permissions:
  contents: read
  packages: write

jobs:
  build_and_push:
    name: Build and Push to Docker Hub
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: cmd/lb/go.mod
          cache: true

      - name: Run tests
        run: go vet ./...
        working-directory: cmd/lb

      - name: Log in to Docker Hub
        if: ${{ github.event.inputs.dry_run != 'true' }}
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Compute version
        id: version
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"
          echo "tag=latest-${SHORT_SHA}" >> $GITHUB_OUTPUT

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: cmd/lb
          file: cmd/lb/Dockerfile
          push: ${{ github.event.inputs.dry_run != 'true' }}
          tags: |
            ${{ github.repository }}-lb:latest
            ${{ github.repository }}-lb:${{ steps.version.outputs.tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
