# lefthook configuration for fraudctl
# https://github.com/evilmartians/lefthook

pre-commit:
  parallel: true
  commands:
    fmt:
      glob: "**/*.go"
      exclude: &go-exclude
        - '^\.agents/.*'
        - '^bin/.*'
        - '^.*\.out$'
        - '^.*\.html$'
        - '^Makefile$'
      run: bash -c 'files=$(gofmt -l .); [ -z "$files" ] && exit 0; printf "unformatted files (run gofmt):\n%s\n" "$files"; exit 1'

    goimports:
      glob: "**/*.go"
      exclude: *go-exclude
      run: bash -c 'command -v goimports >/dev/null 2>&1 || exit 0; files=$(goimports -l .); [ -z "$files" ] && exit 0; printf "goimports issues (run goimports -w .):\n%s\n" "$files"; exit 1'

    vet:
      glob: "**/*.go"
      exclude: *go-exclude
      run: go vet ./...

    lint:
      glob: "**/*.go"
      exclude: *go-exclude
      run: bash -c 'command -v golangci-lint >/dev/null 2>&1 || exit 0; golangci-lint run'

    dockerfile-lint:
      glob: "Dockerfile*"
      run: |
        command -v hadolint >/dev/null 2>&1 || { echo "hadolint not installed, skipping (brew install hadolint)"; exit 0; }
        hadolint Dockerfile || exit 1

    docker-compose-lint:
      glob: "docker-compose*.yml"
      run: |
        command -v hadolint >/dev/null 2>&1 || exit 0
        hadolint --ignore DL3008 docker-compose.yml || exit 1

    nginx-lint:
      glob: "nginx.conf"
      run: |
        command -v nginx >/dev/null 2>&1 || exit 0
        nginx -t 2>&1 | grep -q "syntax is ok" || { echo "nginx config error"; nginx -t; exit 1; }

    test:
      exclude: *go-exclude
      run: |
        go test -race -coverprofile=/tmp/fraudctl-coverage.out ./... &&
        go tool cover -func=/tmp/fraudctl-coverage.out &&
        COV=$(go tool cover -func=/tmp/fraudctl-coverage.out | grep "^total:" | awk '{gsub(/%/,"",$3); print $3}') &&
        awk -v cov="$COV" "BEGIN {if (cov+0 < 80) {print \"FAIL: Coverage \" cov \"% is below the required 80%\"; exit 1} else {print \"PASS: Coverage \" cov \"% meets the 80% threshold\"}}"

pre-push:
  parallel: true
  commands:
    build:
      exclude: *go-exclude
      run: go build ./...

    mod-tidy:
      exclude: *go-exclude
      run: |
        go mod tidy
        git diff --exit-code -- go.mod go.sum || (echo "go.mod/go.sum are not tidy — run 'go mod tidy' and stage the changes"; exit 1)

    lint-full:
      exclude: *go-exclude
      run: bash -c 'command -v golangci-lint >/dev/null 2>&1 || { echo "golangci-lint not installed, skipping"; exit 0; }; golangci-lint run --timeout=5m'

    test-cover:
      exclude: *go-exclude
      run: |
        go test -race -coverprofile=/tmp/fraudctl-coverage.out ./... &&
        go tool cover -func=/tmp/fraudctl-coverage.out &&
        COV=$(go tool cover -func=/tmp/fraudctl-coverage.out | grep "^total:" | awk '{gsub(/%/,"",$3); print $3}') &&
        awk -v cov="$COV" "BEGIN {if (cov+0 < 80) {print \"FAIL: Coverage \" cov \"% is below the required 80%\"; exit 1} else {print \"PASS: Coverage \" cov \"% meets the 80% threshold\"}}"

    vuln:
      exclude: *go-exclude
      run: bash -c 'command -v govulncheck >/dev/null 2>&1 || { echo "govulncheck not installed, skipping"; exit 0; }; govulncheck ./...'

    semgrep:
      exclude: *go-exclude
      run: |
        command -v semgrep >/dev/null 2>&1 || { echo "semgrep not installed, skipping"; exit 0; }
        semgrep --config p/go
