# lefthook.yml - Git hooks configuration for fraudctl
#
# Hooks configured for this Go project:
# - pre-commit: fast checks (tests, format, vet)
# - pre-push: build verification

pre-commit:
  parallel: false
  commands:
    tests:
      run: go test ./...
      tags: [test]

    format:
      run: gofmt -l .
      tags: [style]
      glob: "*.go"

    vet:
      run: go vet ./...
      tags: [analysis]

pre-push:
  parallel: false
  commands:
    build:
      run: go build ./...
      tags: [build]
