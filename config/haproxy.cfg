global
    nbthread 1
    maxconn 20000
    ulimit-n 65536
    tune.bufsize 8192
    tune.http.maxhdr 50

defaults
    mode http
    option dontlognull
    option http-keep-alive
    option tcp-smart-accept
    option tcp-smart-connect
    timeout connect 50ms
    timeout client 5s
    timeout server 5s
    timeout http-keep-alive 75s

frontend main
    bind *:9999
    default_backend api

backend api
    balance roundrobin
    http-reuse always

    option httpchk GET /ready
    server api-1 /sockets/api-1.sock maxconn 5000 check inter 5s fall 3 rise 2
    server api-2 /sockets/api-2.sock maxconn 5000 check inter 5s fall 3 rise 2
