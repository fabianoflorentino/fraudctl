# =============================================================================
# fraudctl - nginx configuration
# =============================================================================
# Round-robin load balancer for 2 API instances
# Optimized for low-latency at 900 req/s
# =============================================================================

worker_processes 1;
worker_rlimit_nofile 65535;

events {
    worker_connections 4096;
    multi_accept on;
    use epoll;
}

http {
    access_log off;
    sendfile on;
    tcp_nodelay on;
    tcp_nopush off;

    # Connection reuse for upstream
    keepalive_requests 100000;
    keepalive_timeout 10s;

    upstream api_backend {
        server api-1:9999;
        server api-2:9999;
        keepalive 16;
    }

    server {
        listen 9999;
        proxy_connect_timeout 2s;
        proxy_send_timeout 5s;
        proxy_read_timeout 5s;
        proxy_next_upstream error timeout http_502;

        # Disable buffering for faster response delivery
        proxy_buffering off;

        location / {
            proxy_http_version 1.1;
            proxy_pass http://api_backend;
            proxy_set_header Connection "";
        }

        location /health {
            proxy_pass http://api_backend/ready;
            proxy_connect_timeout 1s;
        }
    }
}
