# =============================================================================
# fraudctl - nginx configuration
# =============================================================================
# Round-robin load balancer for 2 API instances
# =============================================================================

worker_processes auto;
worker_rlimit_nofile 65535;

events {
    worker_connections 4096;
    multi_accept on;
    use epoll;
}

http {
    access_log off;
    keepalive_requests 100000;
    keepalive_timeout 65;
    tcp_nodelay on;
    tcp_nopush off;

    upstream api_backend {
        least_conn;
        server api-1:9999 weight=1 max_fails=0 fail_timeout=0;
        server api-2:9999 weight=1 max_fails=0 fail_timeout=0;
        keepalive 64;
    }

    server {
        listen 9999;
        proxy_connect_timeout 2s;
        proxy_send_timeout 5s;
        proxy_read_timeout 5s;
        proxy_next_upstream error timeout http_502;

        location / {
            proxy_http_version 1.1;
            proxy_pass http://api_backend;
            proxy_set_header Connection "";

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /health {
            proxy_pass http://api_backend/ready;
            proxy_connect_timeout 1s;
        }
    }
}