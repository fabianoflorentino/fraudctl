# =============================================================================
# fraudctl - Docker Compose
# =============================================================================
# nginx (round-robin) + 2 API instances
# Total resources: ~1 CPU, 350 MB RAM
# Unix Domain Sockets (tmpfs) replace TCP loopback — saves ~40-60µs/request.
# =============================================================================
x-api-env: &api-env
  PORT: 9999
  RESOURCES: /resources
  GOMAXPROCS: 2
  GOGC: off
  GOMEMLIMIT: 120MiB

x-api-healthcheck: &api-healthcheck
  test: ["CMD", "/fraudctl", "-healthcheck"]
  interval: 5s
  timeout: 5s
  retries: 20
  start_period: 30s

x-api-resources: &api-resources
  resources:
    limits:
      cpus: "0.45"
      memory: 150M
    reservations:
      cpus: "0.1"
      memory: 110M

x-api-defaults: &api-defaults
  image: fabianoflorentino/fraudctl:v1.0.53
  volumes:
    - sockets:/sockets
  healthcheck: *api-healthcheck
  deploy: *api-resources
  restart: unless-stopped

services:
  api-1:
    <<: *api-defaults
    container_name: fraudctl-api-1
    hostname: api-1
    environment:
      <<: *api-env
      UNIX_SOCKET: /sockets/api-1.sock

  api-2:
    <<: *api-defaults
    container_name: fraudctl-api-2
    hostname: api-2
    environment:
      <<: *api-env
      UNIX_SOCKET: /sockets/api-2.sock

  nginx:
    image: nginx:alpine
    container_name: fraudctl-nginx
    hostname: nginx
    ports:
      - "9999:9999"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - sockets:/sockets
    depends_on:
      api-1:
        condition: service_healthy
      api-2:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: "0.10"
          memory: 30M
        reservations:
          cpus: "0.05"
          memory: 10M
    restart: unless-stopped

volumes:
  sockets:
    driver: local
    driver_opts:
      type: tmpfs
      device: tmpfs
      o: "uid=65532,gid=65532"

networks:
  default:
    name: fraudctl-network
