# =============================================================================
# fraudctl - Docker Compose
# =============================================================================
# Custom SCM_RIGHTS load balancer + 2 API instances
# Total resources: ~1.0 CPU, 350 MB RAM
# =============================================================================
x-api-env: &api-env
  RESOURCES: /resources
  GOMAXPROCS: 1
  GOGC: off
  GOMEMLIMIT: 145MiB
  TELEMETRY_ENABLED: "false"

x-api-healthcheck: &api-healthcheck
  test: ["CMD", "/fraudctl", "-healthcheck"]
  interval: 5s
  timeout: 5s
  retries: 20
  start_period: 30s

x-api-resources: &api-resources
  resources:
    limits:
      cpus: "0.47"
      memory: 170M
    reservations:
      cpus: "0.1"
      memory: 110M

x-api-defaults: &api-defaults
  image: fraudctl:latest
  build:
    context: .
    dockerfile: Dockerfile
  volumes:
    - sockets:/sockets
  healthcheck: *api-healthcheck
  deploy: *api-resources
  restart: unless-stopped
  ulimits:
    nofile:
      soft: 65536
      hard: 65536
  security_opt:
    - seccomp:unconfined


services:
  api-1:
    <<: *api-defaults
    container_name: fraudctl-api-1
    hostname: api-1
    environment:
      <<: *api-env
      CTRL_SOCKET: /sockets/lb-ctrl-1.sock

  api-2:
    <<: *api-defaults
    container_name: fraudctl-api-2
    hostname: api-2
    environment:
      <<: *api-env
      CTRL_SOCKET: /sockets/lb-ctrl-2.sock

  lb:
    build:
      context: ./cmd/lb
      dockerfile: Dockerfile
    image: fraudctl-lb:latest
    command:
      - "-workers"
      - "/sockets/lb-ctrl-1.sock,/sockets/lb-ctrl-2.sock"
    container_name: fraudctl-lb
    hostname: lb
    ports:
      - "9999:9999"
    volumes:
      - sockets:/sockets
    depends_on:
      api-1:
        condition: service_healthy
      api-2:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 10M
        reservations:
          cpus: "0.05"
          memory: 10M
    restart: unless-stopped
    sysctls:
      net.core.somaxconn: 4096
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    security_opt:
      - seccomp:unconfined
    environment:
      GOMAXPROCS: "1"
      GOGC: "off"
      GOMEMLIMIT: "10MiB"

volumes:
  sockets:
    driver: local
    driver_opts:
      type: tmpfs
      device: tmpfs
      o: "uid=65532,gid=65532"

networks:
  default:
    name: fraudctl-network
