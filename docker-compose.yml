# =============================================================================
# fraudctl - Docker Compose
# =============================================================================
# HAProxy (round-robin) + 2 API instances
# Total resources: ~1.0 CPU, 350 MB RAM
# Unix Domain Sockets (tmpfs) replace TCP loopback — saves ~40-60µs/request.
# =============================================================================
x-api-env: &api-env
  PORT: 9999
  RESOURCES: /resources
  GOMAXPROCS: 1
  GOGC: off
  GOMEMLIMIT: 145MiB

x-api-healthcheck: &api-healthcheck
  test: ["CMD", "/fraudctl", "-healthcheck"]
  interval: 5s
  timeout: 5s
  retries: 20
  start_period: 30s

x-api-resources: &api-resources
  resources:
    limits:
      cpus: "0.40"
      memory: 150M
    reservations:
      cpus: "0.1"
      memory: 110M


x-api-defaults: &api-defaults
  image: fabianoflorentino/fraudctl:v1.0.79
  volumes:
    - sockets:/sockets
  healthcheck: *api-healthcheck
  deploy: *api-resources
  restart: unless-stopped
  ulimits:
    nofile:
      soft: 65536
      hard: 65536
  security_opt:
    - seccomp:unconfined

services:
  api-1:
    <<: *api-defaults
    container_name: fraudctl-api-1
    hostname: api-1
    environment:
      <<: *api-env
      UNIX_SOCKET: /sockets/api-1.sock

  api-2:
    <<: *api-defaults
    container_name: fraudctl-api-2
    hostname: api-2
    environment:
      <<: *api-env
      UNIX_SOCKET: /sockets/api-2.sock

  haproxy:
    image: haproxy:alpine
    container_name: fraudctl-haproxy
    hostname: haproxy
    ports:
      - "9999:9999"
    volumes:
      - ./config/haproxy.cfg:/usr/local/etc/haproxy/haproxy.cfg:ro
      - sockets:/sockets
    depends_on:
      api-1:
        condition: service_healthy
      api-2:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: "0.20"
          memory: 50M
        reservations:
          cpus: "0.05"
          memory: 10M
    restart: unless-stopped
    sysctls:
      net.core.somaxconn: 4096
      net.ipv4.tcp_fin_timeout: 15
      net.ipv4.tcp_tw_reuse: 1
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    security_opt:
      - seccomp:unconfined

volumes:
  sockets:
    driver: local
    driver_opts:
      type: tmpfs
      device: tmpfs
      o: "uid=65532,gid=65532"

networks:
  default:
    name: fraudctl-network
