# =============================================================================
# fraudctl - Docker Compose
# =============================================================================
# nginx (round-robin) + 2 API instances
# Total resources: ~1 CPU, 350 MB RAM
# Unix Domain Sockets (tmpfs) replace TCP loopback — saves ~40-60µs/request.
# =============================================================================

services:
  api-1:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fraudctl-api-1
    hostname: api-1
    environment:
      - PORT=9999
      - RESOURCES=/resources
      - UNIX_SOCKET=/sockets/api-1.sock
      - GOMAXPROCS=1
      - GOGC=500
      - GOMEMLIMIT=140MiB
    volumes:
      - sockets:/sockets
    healthcheck:
      test: ["CMD", "/fraudctl", "-healthcheck"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: '0.45'
          memory: 150M
        reservations:
          cpus: '0.1'
          memory: 150M
    restart: unless-stopped

  api-2:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fraudctl-api-2
    hostname: api-2
    environment:
      - PORT=9999
      - RESOURCES=/resources
      - UNIX_SOCKET=/sockets/api-2.sock
      - GOMAXPROCS=1
      - GOGC=500
      - GOMEMLIMIT=140MiB
    volumes:
      - sockets:/sockets
    healthcheck:
      test: ["CMD", "/fraudctl", "-healthcheck"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: '0.45'
          memory: 150M
        reservations:
          cpus: '0.1'
          memory: 150M
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: fraudctl-nginx
    hostname: nginx
    ports:
      - "9999:9999"
    volumes:
      - ./config/nginx.conf:/etc/nginx/nginx.conf:ro
      - sockets:/sockets
    depends_on:
      api-1:
        condition: service_healthy
      api-2:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '0.10'
          memory: 30M
        reservations:
          cpus: '0.05'
          memory: 10M
    restart: unless-stopped

volumes:
  sockets:
    driver: local
    driver_opts:
      type: tmpfs
      device: tmpfs

# Resource allocation summary:
#   nginx:    0.10 CPU,  30 MB
#   api-1:    0.45 CPU, 150 MB
#   api-2:    0.45 CPU, 150 MB
#   Total:    1.00 CPU, 330 MB (within 350 MB limit)
#
# Port 9999 is exposed by nginx load balancer

networks:
  default:
    name: fraudctl-network
