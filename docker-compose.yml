# =============================================================================
# fraudctl - Docker Compose
# =============================================================================
# nginx (round-robin) + 2 API instances
# Total resources: ~1 CPU, 350 MB RAM
# =============================================================================

services:
  api-1:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fraudctl-api-1
    hostname: api-1
    ports:
      - "9999"
    environment:
      - PORT=9999
      - RESOURCES=/home/appuser/resources
    deploy:
      resources:
        limits:
          cpus: '0.45'
          memory: 150M
        reservations:
          cpus: '0.1'
          memory: 50M
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:9999/ready"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s
    restart: unless-stopped

  api-2:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fraudctl-api-2
    hostname: api-2
    environment:
      - PORT=9999
      - RESOURCES=/home/appuser/resources
    deploy:
      resources:
        limits:
          cpus: '0.45'
          memory: 150M
        reservations:
          cpus: '0.1'
          memory: 50M
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:9999/ready"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: fraudctl-nginx
    hostname: nginx
    ports:
      - "9999:9999"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      api-1:
        condition: service_healthy
      api-2:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '0.10'
          memory: 30M
        reservations:
          cpus: '0.05'
          memory: 10M
    restart: unless-stopped

# Resource allocation summary:
#   nginx:    0.10 CPU,  30 MB
#   api-1:    0.45 CPU, 150 MB
#   api-2:    0.45 CPU, 150 MB
#   Total:    1.00 CPU, 330 MB (within 350 MB limit)
#
# Port 9999 is exposed by nginx load balancer

networks:
  default:
    name: fraudctl-network